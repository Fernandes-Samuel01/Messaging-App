<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Messenger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSvhCjEVEbt0elvmOQY-MTNtNHZFiJuEEgoMEQPvijp_4Gjnp5C');
    }

    .container {
      width: 350px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .messages {
      height: 250px;
      overflow-y: auto;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
      list-style: none;
    }

    .messages li {
      background: white;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      position: relative;
      padding-left: 30px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* Custom emoji bullet */
    .messages li::before {
      content: "💬";
      position: absolute;
      left: 8px;
      top: 8px;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #667eea;
    }

    button {
      background: #667eea;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>WhatsApp Messenger 💬</h2>

    <ul class="messages" id="messageList"></ul>

    <div class="input-area">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Type your message..." 
      />
      <button onclick="sendMessage()">📨</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const messageText = input.value.trim();

      if (messageText === "") return;

      const li = document.createElement("li");
      li.textContent = messageText;

      document.getElementById("messageList").appendChild(li);

      input.value = "";
      input.focus();
    }

    // Enter key support
    document.getElementById("messageInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
